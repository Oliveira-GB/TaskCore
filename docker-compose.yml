services:
  # BANCO DE DADOS
  taskcore-db:
    image: postgres:16-alpine
    container_name: taskcore-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-taskcore_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password}
      POSTGRES_DB: ${DB_NAME:-taskcore_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # APLICAÇÃO API
  taskcore-api:
    image: taskcore-api:latest
    container_name: taskcore-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://taskcore-db:5432/${DB_NAME:-taskcore_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-taskcore_admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin_password}
    depends_on:
      - taskcore-db

  # INTERFACE WEB (PGADMIN)
  taskcore-pgadmin:
    image: dpage/pgadmin4
    container_name: taskcore-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - taskcore-db

volumes:
  postgres-data: