name: TaskCore CI/CD

on:
  push:
    branches: [ "main", "develop", "feature/*", "test/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissão de execução ao mvnw
        run: chmod +x mvnw

      # Executa todos os testes (TaskServiceTest e o novo TaskControllerTest)
      - name: Executar testes
        run: ./mvnw clean test

      # NOVO PASSO: Salva os relatórios do Maven (Surefire) para você baixar/visualizar no GitHub
      - name: Salvar relatórios de teste
        if: always() # Garante que os relatórios sejam salvos mesmo se os testes falharem
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-testes-maven
          path: target/surefire-reports/